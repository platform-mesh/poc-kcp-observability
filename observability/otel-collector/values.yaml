# OpenTelemetry Collector Helm values
# Ref: https://github.com/open-telemetry/opentelemetry-helm-charts

mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  # Use chart default tag (matches chart version 0.145.0)

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP
  # Disable default ports we don't need
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false

extraVolumes:
  - name: kcp-audit-logs
    hostPath:
      path: /var/log/kcp
      type: DirectoryOrCreate

extraVolumeMounts:
  - name: kcp-audit-logs
    mountPath: /var/log/kcp
    readOnly: true

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    filelog:
      include:
        - /var/log/kcp/audit.log
      start_at: beginning
      operators:
        - type: json_parser
          on_error: drop
          timestamp:
            parse_from: body.requestReceivedTimestamp
            layout_type: gotime
            layout: '2006-01-02T15:04:05.000000Z'
        - type: move
          from: body.verb
          to: attributes.audit_verb
          if: '"verb" in body'
        - type: move
          from: body.user.username
          to: attributes.audit_user
          if: '"user" in body and "username" in body["user"]'
        - type: move
          from: body.objectRef.resource
          to: attributes.audit_resource
          if: '"objectRef" in body and "resource" in body["objectRef"]'
        - type: move
          from: body.objectRef.apiGroup
          to: attributes.audit_api_group
          if: '"objectRef" in body and "apiGroup" in body["objectRef"]'
        - type: move
          from: body.responseStatus.code
          to: attributes.response_code
          if: '"responseStatus" in body and "code" in body["responseStatus"]'
        - type: move
          from: body["annotations"]["kcp.io/path"]
          to: attributes.workspace_path
          if: '"annotations" in body and "kcp.io/path" in body["annotations"]'
        - type: move
          from: body["annotations"]["tenancy.kcp.io/workspace"]
          to: attributes.logical_cluster
          if: '"annotations" in body and "tenancy.kcp.io/workspace" in body["annotations"]'
        - type: severity_parser
          parse_from: attributes.response_code
          if: '"response_code" in attributes'
          mapping:
            error:
              - min: 500
                max: 599
            warn:
              - min: 400
                max: 499
            info:
              - min: 200
                max: 399
    # Explicitly null out default receivers the chart merges in
    jaeger: null
    zipkin: null
    prometheus: null

  processors:
    batch/metrics:
      timeout: 10s
      send_batch_size: 1024
    batch/logs:
      timeout: 5s
      send_batch_size: 256
    memory_limiter:
      check_interval: 5s
      limit_mib: 200
      spike_limit_mib: 50

  exporters:
    prometheusremotewrite:
      endpoint: "http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write"
      tls:
        insecure: true
      resource_to_telemetry_conversion:
        enabled: true
    debug:
      verbosity: basic

  service:
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch/metrics]
        exporters: [prometheusremotewrite, debug]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch/metrics]
        exporters: [debug]
      logs:
        receivers: [otlp, filelog]
        processors: [memory_limiter, batch/logs]
        exporters: [debug]
    telemetry:
      metrics:
        readers:
          - pull:
              exporter:
                prometheus:
                  host: "0.0.0.0"
                  port: 8888
