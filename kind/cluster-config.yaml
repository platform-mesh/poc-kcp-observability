# Kind cluster configuration for KCP + observability stack
# Single control-plane node with NodePort mappings for local access
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.31.0
    extraPortMappings:
      # Grafana UI
      - containerPort: 30080
        hostPort: 3000
        protocol: TCP
      # Prometheus UI
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      # KCP front-proxy
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
