# KCP Helm chart values for local Kind deployment
# Ref: https://github.com/kcp-dev/helm-charts (chart v0.14.0)

# Top-level: required by the chart template
externalHostname: kcp.localhost
externalPort: "8443"

kcp:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  extraFlags:
    - "--audit-policy-file=/etc/kcp/audit/audit-policy.yaml"
    - "--audit-log-path=/var/log/kcp/audit.log"
    - "--audit-log-format=json"
    - "--audit-log-maxsize=100"
    - "--audit-log-maxbackup=3"
  extraVolumes:
    - name: audit-policy
      configMap:
        name: kcp-audit-policy
    - name: audit-logs
      hostPath:
        path: /var/log/kcp
        type: DirectoryOrCreate
  extraVolumeMounts:
    - name: audit-policy
      mountPath: /etc/kcp/audit
      readOnly: true
    - name: audit-logs
      mountPath: /var/log/kcp
  monitoring:
    serviceMonitor:
      enabled: true

# Disable built-in audit (creates PVC, not shareable with OTel Collector)
audit:
  enabled: false

kcpFrontProxy:
  replicas: 1
  service:
    type: NodePort
    nodePort: 30443
  monitoring:
    serviceMonitor:
      enabled: true

etcd:
  enabled: true
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      memory: 2Gi
  volumeSize: 8Gi
  monitoring:
    serviceMonitor:
      enabled: true
